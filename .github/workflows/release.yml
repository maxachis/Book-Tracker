name: Release Windows Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Book Tracker ${{ github.ref_name }}'
          releaseBody: 'See the assets below to download and install Book Tracker for Windows.'
          releaseDraft: false
          prerelease: false

  update-scoop-manifest:
    needs: build-windows
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Get NSIS installer hash
        id: hash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Download the NSIS exe installer from the release
          # Product name "Book Tracker" may produce "Book Tracker_" or "Book-Tracker_"
          gh release download "${{ github.ref_name }}" \
            --pattern "*_x64-setup.exe" \
            --dir /tmp/release

          # Compute SHA256
          FILE=$(ls /tmp/release/*_x64-setup.exe)
          HASH=$(sha256sum "$FILE" | awk '{print $0}' | cut -d' ' -f1)
          FILENAME=$(basename "$FILE")
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"
          echo "filename=$FILENAME" >> "$GITHUB_OUTPUT"

      - name: Update Scoop manifest
        env:
          VERSION: ${{ steps.version.outputs.version }}
          HASH: ${{ steps.hash.outputs.hash }}
          FILENAME: ${{ steps.hash.outputs.filename }}
          TAG: ${{ github.ref_name }}
        run: |
          python3 -c "
          import json, os, urllib.parse
          filename = urllib.parse.quote(os.environ['FILENAME'])
          manifest = {
              'version': os.environ['VERSION'],
              'description': 'A desktop book tracking application built with Tauri',
              'homepage': 'https://github.com/maxachis/Book-Tracker',
              'license': 'MIT',
              'architecture': {
                  '64bit': {
                      'url': f\"https://github.com/maxachis/Book-Tracker/releases/download/{os.environ['TAG']}/{filename}\",
                      'hash': os.environ['HASH']
                  }
              },
              'installer': {'args': ['/S']},
              'uninstaller': {
                  'file': '\$dir\\\\uninstall.exe',
                  'args': ['/S']
              }
          }
          with open('bucket/book-tracker.json', 'w') as f:
              json.dump(manifest, f, indent=2)
              f.write('\n')
          "

      - name: Commit updated manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bucket/book-tracker.json
          git commit -m "Update Scoop manifest for ${{ github.ref_name }}"
          git push origin HEAD:main
