name: Release Windows Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: wails/go.sum

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        working-directory: wails/frontend
        run: npm install

      - name: Build Wails app
        working-directory: wails
        run: wails build -platform windows/amd64 -clean

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: 'Book Tracker ${{ github.ref_name }}'
          body: 'Download book-tracker.exe below to run Book Tracker on Windows.'
          draft: false
          prerelease: false
          files: wails/build/bin/book-tracker.exe

  update-scoop-manifest:
    needs: build-windows
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Get executable hash
        id: hash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ github.ref_name }}" \
            --pattern "book-tracker.exe" \
            --dir /tmp/release

          FILE=/tmp/release/book-tracker.exe
          HASH=$(sha256sum "$FILE" | cut -d' ' -f1)
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"
          echo "filename=book-tracker.exe" >> "$GITHUB_OUTPUT"

      - name: Update Scoop manifest
        env:
          VERSION: ${{ steps.version.outputs.version }}
          HASH: ${{ steps.hash.outputs.hash }}
          FILENAME: ${{ steps.hash.outputs.filename }}
          TAG: ${{ github.ref_name }}
        run: |
          python3 -c "
          import json, os, urllib.parse
          filename = urllib.parse.quote(os.environ['FILENAME'])
          manifest = {
              'version': os.environ['VERSION'],
              'description': 'A desktop book tracking application built with Wails',
              'homepage': 'https://github.com/maxachis/Book-Tracker',
              'license': 'MIT',
              'architecture': {
                  '64bit': {
                      'url': f\"https://github.com/maxachis/Book-Tracker/releases/download/{os.environ['TAG']}/{filename}\",
                      'hash': os.environ['HASH']
                  }
              },
              'bin': 'book-tracker.exe',
              'shortcuts': [['book-tracker.exe', 'Book Tracker']]
          }
          with open('bucket/book-tracker.json', 'w') as f:
              json.dump(manifest, f, indent=2)
              f.write('\n')
          "

      - name: Commit updated manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bucket/book-tracker.json
          git commit -m "Update Scoop manifest for ${{ github.ref_name }}"
          git push origin HEAD:main
