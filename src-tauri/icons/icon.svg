<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1814"/>
      <stop offset="100%" stop-color="#0f0e0c"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8d5a3"/>
      <stop offset="100%" stop-color="#b8943f"/>
    </linearGradient>
    <linearGradient id="goldLight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4b978"/>
      <stop offset="100%" stop-color="#9a7a32"/>
    </linearGradient>
    <linearGradient id="pageShadow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(0,0,0,0.15)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Subtle corner ornaments -->
  <path d="M56,56 L56,86 M56,56 L86,56" stroke="#d4b978" stroke-width="2" opacity="0.2" fill="none" stroke-linecap="round"/>
  <path d="M456,56 L456,86 M456,56 L426,56" stroke="#d4b978" stroke-width="2" opacity="0.2" fill="none" stroke-linecap="round"/>
  <path d="M56,456 L56,426 M56,456 L86,456" stroke="#d4b978" stroke-width="2" opacity="0.2" fill="none" stroke-linecap="round"/>
  <path d="M456,456 L456,426 M456,456 L426,456" stroke="#d4b978" stroke-width="2" opacity="0.2" fill="none" stroke-linecap="round"/>

  <!-- Book - back cover -->
  <rect x="128" y="88" width="228" height="336" rx="6" fill="#2e2b25" stroke="#d4b978" stroke-width="1.5" opacity="0.4"/>

  <!-- Book - pages (visible edge) -->
  <rect x="142" y="96" width="220" height="320" rx="4" fill="#3a3630"/>
  <line x1="144" y1="108" x2="360" y2="108" stroke="#4a4640" stroke-width="0.5"/>
  <line x1="144" y1="120" x2="360" y2="120" stroke="#4a4640" stroke-width="0.5"/>
  <line x1="144" y1="132" x2="360" y2="132" stroke="#4a4640" stroke-width="0.5"/>

  <!-- Book - front cover -->
  <rect x="156" y="80" width="228" height="336" rx="8" fill="#22201b" stroke="url(#goldLight)" stroke-width="1.5"/>

  <!-- Spine highlight -->
  <rect x="156" y="80" width="8" height="336" rx="4" fill="url(#pageShadow)" opacity="0.5"/>

  <!-- Cover inner border (decorative frame) -->
  <rect x="180" y="108" width="180" height="280" rx="4" fill="none" stroke="#d4b978" stroke-width="1" opacity="0.2"/>

  <!-- Diamond ornament top -->
  <path d="M270,128 L280,140 L270,152 L260,140 Z" fill="url(#gold)" opacity="0.7"/>

  <!-- Title line -->
  <rect x="210" y="172" width="120" height="4" rx="2" fill="url(#gold)" opacity="0.8"/>
  <!-- Author line -->
  <rect x="224" y="188" width="92" height="2.5" rx="1.25" fill="#d4b978" opacity="0.35"/>

  <!-- Decorative rule -->
  <line x1="220" y1="210" x2="320" y2="210" stroke="#d4b978" stroke-width="0.75" opacity="0.25"/>

  <!-- Progress bar on cover (the tracking concept) -->
  <rect x="200" y="234" width="140" height="6" rx="3" fill="#2e2b25"/>
  <rect x="200" y="234" width="95" height="6" rx="3" fill="url(#gold)" opacity="0.9"/>

  <!-- Small text lines below progress -->
  <rect x="220" y="256" width="100" height="2" rx="1" fill="#d4b978" opacity="0.2"/>
  <rect x="230" y="266" width="80" height="2" rx="1" fill="#d4b978" opacity="0.15"/>

  <!-- Diamond ornament bottom -->
  <path d="M270,302 L278,312 L270,322 L262,312 Z" fill="url(#gold)" opacity="0.5"/>

  <!-- Bookmark ribbon -->
  <path d="M340,80 L340,148 L330,136 L320,148 L320,80" fill="#c47272" opacity="0.75"/>
</svg>
